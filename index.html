<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VASTRA</title>
  <meta http-equiv="refresh" content="0; url=./1.html">
  <style>
    :root {
      --bg: #07080c;
      --card: #11131a;
      --text: #f1eee8;
      --muted: #9fa8b6;
      --gold: #c9a96e;
      --border: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 0.06em;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    a, button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      padding: 10px 14px;
      background: transparent;
      cursor: pointer;
      font-weight: 700;
    }
    a:hover, button:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #111;
    }
    code {
      display: block;
      margin-top: 8px;
      background: #0b0d13;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: #dce4f2;
      font-size: 13px;
    }
    .ok {
      color: #66d39a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Redirecting to VASTRA home...</h1>
    <p>If redirection does not happen, open <a class="primary" href="./1.html">1.html</a>.</p>
  </main>
</body>
</html>
