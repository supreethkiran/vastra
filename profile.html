<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VASTRA — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060608;
      --surface:rgba(18,19,26,0.72);
      --surface2:rgba(255,255,255,0.03);
      --text:#f0ece4;
      --muted:rgba(240,236,228,.5);
      --gold:#c9a96e;
      --gold-dark:#b6985d;
      --border:rgba(255,255,255,.08);
      --danger:#ff6b7a;
      --ok:#57d39b;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --ease:cubic-bezier(0.23,1,0.3,1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    img{max-width:100%;height:auto}
    button{min-height:44px}
    h1,h2,p{word-wrap:break-word;overflow-wrap:anywhere}
    body::before{
      content:'';position:fixed;inset:0;z-index:-1;
      background:
        radial-gradient(circle at 70% 5%, rgba(201,169,110,.04), transparent 45%),
        radial-gradient(circle at 10% 90%, rgba(74,240,212,.02), transparent 40%);
    }
    a{color:inherit;text-decoration:none}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(6,6,8,.88);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    }
    .topbar-inner{
      max-width:1220px;margin:0 auto;padding:16px 24px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .brand{
      font-family:'Bebas Neue',sans-serif;
      letter-spacing:.22em;font-size:22px;
      background:linear-gradient(120deg,#fff 0%,var(--gold) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .nav-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

    /* ── MAIN CONTENT ── */
    .wrap{width:100%;max-width:1220px;margin:0 auto;padding:48px 24px 100px}
    @media (max-width:768px){.topbar-inner{padding-left:16px;padding-right:16px}.wrap{padding-left:16px;padding-right:16px}}

    /* ── GLASS CARD ── */
    .card{
      background:var(--surface);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border);
      border-radius:20px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    /* ── TYPOGRAPHY ── */
    .title{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:.04em;margin-bottom:8px}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:var(--gold);text-transform:uppercase;}
    .muted{color:var(--muted)}

    /* ── BUTTONS ── */
    .btn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:99px;
      padding:10px 18px;
      cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:10px;
      transition:all .25s var(--ease);
      min-height:40px;
      display:inline-flex;align-items:center;gap:6px;
    }
    .btn:hover{border-color:rgba(201,169,110,.5);color:var(--gold);transform:translateY(-1px)}
    .btn.primary{background:var(--gold);border-color:var(--gold);color:#060608}
    .btn.primary:hover{background:var(--gold-dark);color:#060608;box-shadow:0 8px 24px rgba(201,169,110,.2)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;pointer-events:none}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

    /* ── LAYOUT ── */
    .layout{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start;margin-top:28px}
    .sidebar{position:sticky;top:90px;display:grid;gap:16px}

    /* ── PILLS ── */
    .pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 12px;border-radius:999px;border:1px solid var(--border);
      background:var(--surface2);color:var(--muted);font-size:11px;font-weight:500;
      letter-spacing:.05em;
    }
    .pill.active-pill{border-color:rgba(87,211,155,.4);color:var(--ok);background:rgba(87,211,155,.08)}

    /* ── NAV ── */
    .navlist{display:grid;gap:6px;margin-top:16px}
    .navitem{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      width:100%;
      border:1px solid var(--border);
      background:var(--surface2);
      color:var(--text);
      border-radius:14px;
      padding:13px 16px;
      cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition:all .2s var(--ease);
      text-align:left;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:10px;
      min-height:48px;
    }
    .navitem:hover{transform:translateX(4px);border-color:rgba(201,169,110,.35);background:rgba(201,169,110,.05)}
    .navitem.active{border-color:rgba(201,169,110,.6);background:rgba(201,169,110,.1);color:var(--gold)}
    .navhint{color:var(--muted);font-weight:500;letter-spacing:0;text-transform:none;font-size:11px;font-family:'DM Sans',sans-serif}

    /* ── CONTENT AREA ── */
    .content{display:grid;gap:16px;animation:fadeInUp .6s var(--ease)}

    /* ── KPIs ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .kpi{
      padding:20px;
      border:1px solid var(--border);border-radius:16px;
      background:var(--surface2);
      transition:all .25s var(--ease);
    }
    .kpi:hover{border-color:rgba(201,169,110,.3);transform:translateY(-2px)}
    .kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
    .kpi .value{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.02em;color:var(--gold)}

    /* ── ROW ── */
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}

    /* ── ORDERS ── */
    .orders{display:grid;gap:12px}
    .order{
      padding:18px 20px;
      border:1px solid var(--border);border-radius:16px;
      background:var(--surface2);
      transition:all .25s var(--ease);
    }
    .order:hover{transform:translateY(-2px);border-color:rgba(201,169,110,.3);box-shadow:0 8px 30px rgba(0,0,0,.3)}

    /* ── STATUS BADGES ── */
    .status{
      display:inline-flex;align-items:center;gap:6px;
      padding:4px 12px;border-radius:999px;border:1px solid var(--border);
      font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
      background:var(--surface2);color:var(--muted);
    }
    .status.ok{border-color:rgba(87,211,155,.4);background:rgba(87,211,155,.1);color:var(--ok)}
    .status.warn{border-color:rgba(201,169,110,.4);background:rgba(201,169,110,.1);color:var(--gold)}
    .status.bad{border-color:rgba(255,107,122,.4);background:rgba(255,107,122,.1);color:var(--danger)}

    /* ── EMPTY / MISC ── */
    .danger{color:var(--danger);font-weight:500}
    .empty{padding:48px 24px;border:1px dashed var(--border);border-radius:16px;color:var(--muted);text-align:center}
    .empty-state{padding:48px;text-align:center;color:var(--muted)}

    /* ── MOBILE TABS ── */
    .tabs{display:none;gap:8px;flex-wrap:wrap}
    .tab{flex:1;min-width:130px}

    @media(max-width:980px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:relative;top:auto}
      .tabs{display:flex}
      .navlist{display:none}
      .kpi-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:540px){
      .topbar-inner{padding:14px 16px}
      .kpi-grid{grid-template-columns:1fr}
      .title{font-size:32px}
      .wrap{padding:28px 16px 80px}
    }
  </style>

</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/#/">VASTRA</a>
      <div class="nav-actions">
        <a class="btn" href="/#/">Shop</a>
        <a class="btn" href="/#/cart">My Bag</a>
        <button id="logoutBtn" class="btn primary" type="button">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="row" style="align-items:flex-end;">
      <div>
        <h1 class="title">My Account</h1>
        <p class="muted" id="statusLine" style="margin-top:6px;font-size:14px;">Loading your account…</p>
      </div>
      <span class="pill" id="loggedInPill">Checking…</span>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <section class="card">
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;">Signed in as</div>
            <strong id="userEmail" style="display:block;font-size:15px;">—</strong>
            <div class="muted" style="font-size:11px;margin-top:2px;">UID: <span id="userUid">—</span></div>
            <span class="pill" id="userStatus" style="margin-top:8px;width:fit-content;">—</span>
          </div>

          <div class="tabs" style="margin-top:12px;">
            <button class="navitem tab" id="nav-dashboard-tab" data-nav="dashboard" type="button">Dashboard <span class="navhint">Overview</span></button>
            <button class="navitem tab" id="nav-orders-tab" data-nav="orders" type="button">My Orders <span class="navhint" id="ordersCount">—</span></button>
            <button class="navitem tab" id="nav-account-tab" data-nav="account" type="button">Account <span class="navhint">Details</span></button>
            <button class="navitem tab" id="nav-cart-tab" data-nav="cart" type="button">My Cart <span class="navhint">Open</span></button>
          </div>

          <div class="navlist">
            <button class="navitem" id="nav-dashboard-side" data-nav="dashboard" type="button">Dashboard <span class="navhint">Overview</span></button>
            <button class="navitem" id="nav-orders-side" data-nav="orders" type="button">My Orders <span class="navhint" id="ordersCountDesktop">—</span></button>
            <button class="navitem" id="nav-cart-side" data-nav="cart" type="button">My Cart <span class="navhint">Open</span></button>
            <button class="navitem" id="nav-account-side" data-nav="account" type="button">Account Details <span class="navhint">Security</span></button>
            <button class="navitem" id="nav-logout-side" data-nav="logout" type="button">Logout <span class="navhint">Sign out</span></button>
          </div>
        </section>
      </aside>

      <section class="content">
        <div id="profile-content"></div>
      </section>
    </div>
  </main>

  <script src="/firebase-config.js"></script>
  <script type="module" src="/firebase-init.js"></script>
  <script>
    const statusLine = document.getElementById("statusLine");
    const loggedInPill = document.getElementById("loggedInPill");
    const ordersCount = document.getElementById("ordersCount");
    const ordersCountDesktop = document.getElementById("ordersCountDesktop");
    const contentRoot = document.getElementById("profile-content");
    const navButtons = Array.from(document.querySelectorAll("[data-nav]"));

    function fmtINR(n){ return "₹" + Number(n || 0).toLocaleString("en-IN"); }
    function esc(v){ return String(v || "").replace(/[&<>"']/g, (ch) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[ch])); }

    function statusClass(status){
      const s = String(status || "pending").toLowerCase();
      if (s.includes("paid") || s.includes("success") || s.includes("completed")) return "ok";
      if (s.includes("fail") || s.includes("cancel")) return "bad";
      return "warn";
    }

    function redirectToLogin(){
      window.location.href = "/#/login";
    }

    function renderOrders(orders){
      const list = Array.isArray(orders) ? orders : [];
      const label = `${list.length} orders`;
      if (ordersCount) ordersCount.textContent = label;
      if (ordersCountDesktop) ordersCountDesktop.textContent = label;
      if (!list.length){
        contentRoot.innerHTML = '<div class="card empty-state"><p class="muted">No orders yet.</p><a class="btn" href="/#/">Start shopping</a></div>';
        return;
      }
      contentRoot.innerHTML = `
        <div class="section-head">
          <div>
            <h2 class="section-title" style="margin:0;">My Orders</h2>
            <p class="muted" style="margin-top:6px;">Track your recent purchases and status updates.</p>
          </div>
          <span class="pill">${esc(label)}</span>
        </div>
        <div class="orders" style="margin-top:12px;">
          ${list.map((o) => {
        const total = o.totalAmount ?? o.total ?? 0;
        const status = o.status ?? (o.paymentStatus ? o.paymentStatus : "pending");
        const dateRaw = o.createdAt?.toDate ? o.createdAt.toDate() : (o.createdAt?.seconds ? new Date(o.createdAt.seconds * 1000) : new Date(o.createdAt || o.date || Date.now()));
        const dateText = isNaN(dateRaw.getTime()) ? "—" : dateRaw.toLocaleString();
        const items = Array.isArray(o.items) ? o.items : [];
        return `
          <article class="order">
            <div class="row">
              <strong>${esc(o.id || o.orderId || "—")}</strong>
              <span class="status ${statusClass(status)}">${esc(status)}</span>
            </div>
            <div class="row" style="margin-top:8px;">
              <span class="muted">${esc(dateText)}</span>
              <strong style="color:var(--gold);">${esc(fmtINR(total))}</strong>
            </div>
            ${
              items.length
                ? `<div class="orders" style="gap:8px;margin-top:10px;">
                    ${items
                      .slice(0, 6)
                      .map((it) => {
                        const name = esc(it.name || "Item");
                        const qty = Number(it.qty || 0);
                        const price = Number(it.price || 0);
                        const line = fmtINR(price * qty);
                        return `<div class="row" style="gap:10px;">
                          <span class="muted" style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name} × ${qty}</span>
                          <strong>${esc(line)}</strong>
                        </div>`;
                      })
                      .join("")}
                    ${items.length > 6 ? `<div class="muted" style="font-size:12px;">+${items.length - 6} more items</div>` : ""}
                  </div>`
                : `<div class="muted" style="margin-top:10px;font-size:12px;">No item details saved for this order.</div>`
            }
          </article>
        `;
      }).join("")}
        </div>
      `;
    }

    async function loadOrders(){
      contentRoot.innerHTML = '<div class="card empty-state"><span class="spinner" style="vertical-align:middle;"></span> <span class="muted">Loading orders…</span></div>';
      try{
        const orders = await window.firebaseApi.getMyOrders();
        renderOrders(orders);
        return orders;
      }catch(e){
        console.error("orders load failed", e);
        contentRoot.innerHTML = `<div class="card empty-state"><p class="danger">${esc(e?.message || "Unable to load orders")}</p></div>`;
        return [];
      }
    }

    function renderUser(user){
      if (!user){
        loggedInPill.textContent = "Logged out";
        document.getElementById("userEmail").textContent = "—";
        document.getElementById("userUid").textContent = "—";
        document.getElementById("userStatus").textContent = "Not signed in";
        return;
      }
      loggedInPill.textContent = "Logged in";
      document.getElementById("userEmail").textContent = user.email || "—";
      document.getElementById("userUid").textContent = user.uid || "—";
      document.getElementById("userStatus").textContent = "Authenticated";
      statusLine.textContent = `Welcome, ${user.email || "user"}`;
    }

    function setActive(key){
      navButtons.forEach((b) => b.classList.toggle("active", b.dataset.nav === key));
    }

    function loadDashboard(user, orders = [], cartCount = 0){
      setActive("dashboard");
      const totalSpent = orders.reduce((sum, o) => sum + Number(o.total || o.totalAmount || 0), 0);
      const recent = orders[0] || null;
      contentRoot.innerHTML = `
        <div class="section-head">
          <div>
            <h2 class="section-title" style="margin:0;">Welcome, ${esc(user.email || "user")}</h2>
            <p class="muted" style="margin-top:6px;">Your account overview</p>
          </div>
          <a class="btn" href="/#/">Shop now</a>
        </div>
        <div class="kpi-grid" style="margin-top:12px;">
          <div class="kpi">
            <div class="label">Orders</div>
            <div class="value">${orders.length}</div>
          </div>
          <div class="kpi">
            <div class="label">Total spent</div>
            <div class="value">${esc(fmtINR(totalSpent))}</div>
          </div>
          <div class="kpi">
            <div class="label">Cart items</div>
            <div class="value" id="kpiCartCount">${cartCount}</div>
          </div>
        </div>
        <div class="card" style="margin-top:12px;">
          <div class="row">
            <strong>Cart preview</strong>
            <a class="btn" href="/#/cart" style="padding:8px 12px;font-size:10px;">Open cart</a>
          </div>
          <div id="cartPreview" class="orders" style="gap:10px;margin-top:10px;"></div>
          <div class="row" style="margin-top:10px;">
            <span class="muted">Subtotal</span>
            <strong id="cartPreviewSubtotal" style="color:var(--gold);">₹0</strong>
          </div>
        </div>
        <div class="card" style="margin-top:12px;">
          <div class="row">
            <strong>Recent activity</strong>
            <span class="pill">${recent ? esc(recent.status || "paid") : "—"}</span>
          </div>
          <p class="muted" style="margin-top:10px;">
            ${recent ? `Last order <strong>${esc(recent.id)}</strong> for <strong>${esc(fmtINR(recent.total || recent.totalAmount || 0))}</strong>.` : "No recent orders yet."}
          </p>
        </div>
      `;
    }

    function loadAccount(user){
      setActive("account");
      contentRoot.innerHTML = `
        <div class="section-head">
          <div>
            <h2 class="section-title" style="margin:0;">Account Details</h2>
            <p class="muted" style="margin-top:6px;">Your identity and sign-in information</p>
          </div>
        </div>
        <div class="card" style="margin-top:12px;">
          <div class="orders" style="gap:8px;">
            <div class="row"><span class="muted">Email</span><strong>${esc(user.email || "—")}</strong></div>
            <div class="row"><span class="muted">UID</span><strong>${esc(user.uid || "—")}</strong></div>
            <div class="row"><span class="muted">Provider</span><strong>${esc((user.providerData && user.providerData[0] && user.providerData[0].providerId) || "firebase")}</strong></div>
          </div>
        </div>
      `;
    }

    // ── CART SECTION (Firestore live) ──
    let cartUnsub = null;
    function renderCart(items){
      const list = Array.isArray(items) ? items : [];
      const subtotal = list.reduce((sum, it) => sum + Number(it.price || 0) * Number(it.qty || 0), 0);
      if (!list.length){
        contentRoot.innerHTML = `
          <div class="section-head">
            <div>
              <h2 class="section-title" style="margin:0;">My Cart</h2>
              <p class="muted" style="margin-top:6px;">Your saved items across devices.</p>
            </div>
            <a class="btn" href="/#/">Continue shopping</a>
          </div>
          <div class="card empty-state" style="margin-top:12px;">
            <p class="muted">Your cart is empty.</p>
          </div>
        `;
        return;
      }
      contentRoot.innerHTML = `
        <div class="section-head">
          <div>
            <h2 class="section-title" style="margin:0;">My Cart</h2>
            <p class="muted" style="margin-top:6px;">Update quantities or remove items.</p>
          </div>
          <a class="btn primary" href="/#/checkout">Checkout</a>
        </div>
        <div class="orders" style="margin-top:12px;">
          ${list.map((it) => `
            <article class="order" data-cart-row="${esc(it.id)}" style="display:flex;gap:12px;align-items:center;">
              <img src="${esc(it.image)}" alt="${esc(it.name)}" style="width:64px;height:64px;border-radius:14px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;">
              <div style="flex:1;min-width:0;">
                <div style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(it.name)}</div>
                <div class="muted" style="margin-top:4px;font-size:12px;">₹${Number(it.price || 0).toLocaleString("en-IN")}</div>
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
                <button class="btn" type="button" data-dec="${esc(it.id)}" style="padding:10px 12px;">−</button>
                <span class="pill" style="min-width:52px;text-align:center;">${Number(it.qty || 0)}</span>
                <button class="btn" type="button" data-inc="${esc(it.id)}" style="padding:10px 12px;">+</button>
                <button class="btn" type="button" data-remove="${esc(it.id)}">Remove</button>
              </div>
            </article>
          `).join("")}
        </div>
        <div class="card" style="margin-top:12px;">
          <div class="row">
            <strong>Subtotal</strong>
            <strong style="color:var(--gold);">${esc(fmtINR(subtotal))}</strong>
          </div>
        </div>
      `;

      // Wire cart controls
      list.forEach((it) => {
        const id = String(it.id);
        contentRoot.querySelector(`[data-inc="${CSS.escape(id)}"]`)?.addEventListener("click", () => {
          window.firebaseApi?.setCartItemQty?.(id, Number(it.qty || 0) + 1).catch((e) => alert(e?.message || "Unable to update cart"));
        });
        contentRoot.querySelector(`[data-dec="${CSS.escape(id)}"]`)?.addEventListener("click", () => {
          window.firebaseApi?.setCartItemQty?.(id, Math.max(0, Number(it.qty || 0) - 1)).catch((e) => alert(e?.message || "Unable to update cart"));
        });
        contentRoot.querySelector(`[data-remove="${CSS.escape(id)}"]`)?.addEventListener("click", () => {
          window.firebaseApi?.removeCartItem?.(id).catch((e) => alert(e?.message || "Unable to remove item"));
        });
      });
    }

    function loadCart(){
      setActive("cart");
      contentRoot.innerHTML = '<div class="card empty-state"><span class="spinner" style="vertical-align:middle;"></span> <span class="muted">Loading cart…</span></div>';
      try {
        cartUnsub?.();
      } catch {
        // ignore
      }
      cartUnsub = window.firebaseApi?.subscribeCart?.((items) => renderCart(items));
      if (!cartUnsub) {
        contentRoot.innerHTML = `<div class="card empty-state"><p class="danger">Cart unavailable. Please refresh.</p></div>`;
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      const btn = document.getElementById("logoutBtn");
      btn.disabled = true;
      const old = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span> Logging out';
      try{
        await window.firebaseApi.signOutUser();
        alert("Logged out");
        window.location.href = "/#/";
      }catch(e){
        console.error("logout failed", e);
        btn.disabled = false;
        btn.textContent = old;
        alert(e?.message || "Logout failed");
      }
    });

    document.querySelectorAll('[data-nav="logout"]').forEach((el) =>
      el.addEventListener("click", async () => {
      try{
        await window.firebaseApi.signOutUser();
        alert("Logged out");
        window.location.href = "/#/";

      }catch(e){
        alert(e?.message || "Logout failed");
      }
      })
    );
    document.querySelectorAll('[data-nav="cart"]').forEach((el) =>
      el.addEventListener("click", () => {
        loadCart();
      })
    );

    (async function init(){
      try{
        statusLine.textContent = "Loading your account…";
        // Auth protection (mandatory): check immediately, then wait briefly for restore.
        const immediate = window.firebaseApi?.getCurrentUser?.() || null;
        if (!immediate) {
          await window.firebaseReady;
        }
        const user =
          window.firebaseApi?.getCurrentUser?.() ||
          (await window.firebaseApi?.waitForAuth?.({ requireUser: true, timeoutMs: 12000 })) ||
          null;
        console.log("User:", user);
        if (!user) return redirectToLogin();
        renderUser(user);
        let cartCount = 0;
        if (window.firebaseApi?.subscribeCart) {
          window.firebaseApi.subscribeCart((items) => {
            const list = Array.isArray(items) ? items : [];
            cartCount = list.reduce((sum, it) => sum + Number(it.qty || 0), 0);
            const el = document.getElementById("kpiCartCount");
            if (el) el.textContent = String(cartCount);

            const preview = document.getElementById("cartPreview");
            const subEl = document.getElementById("cartPreviewSubtotal");
            if (preview && subEl) {
              const top = list.slice(0, 3);
              if (!top.length) {
                preview.innerHTML = '<div class="muted">Your cart is empty.</div>';
                subEl.textContent = fmtINR(0);
              } else {
                preview.innerHTML = top
                  .map(
                    (it) => `
                      <div class="order" style="display:flex;gap:10px;align-items:center;">
                        <img src="${esc(it.image)}" alt="${esc(it.name)}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid var(--border);">
                        <div style="flex:1;min-width:0;">
                          <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(it.name)}</div>
                          <div class="muted" style="font-size:12px;margin-top:2px;">₹${Number(it.price || 0).toLocaleString("en-IN")} × ${Number(it.qty || 0)}</div>
                        </div>
                      </div>
                    `
                  )
                  .join("");
                const subtotal = list.reduce((sum, it) => sum + Number(it.price || 0) * Number(it.qty || 0), 0);
                subEl.textContent = fmtINR(subtotal);
              }
            }
          });
        }
        const orders = await loadOrders();
        loadDashboard(user, orders, cartCount);

        // Sidebar navigation
        document.querySelectorAll('[data-nav="dashboard"]').forEach((b) =>
          b.addEventListener("click", () => loadDashboard(user, orders, cartCount))
        );
        document.querySelectorAll('[data-nav="orders"]').forEach((b) =>
          b.addEventListener("click", async () => {
            setActive("orders");
            await loadOrders();
          })
        );
        document.querySelectorAll('[data-nav="account"]').forEach((b) => b.addEventListener("click", () => loadAccount(user)));
      }catch(e){
        console.error("profile init failed", e);
        statusLine.textContent = e?.message || "Unable to load profile.";
      }
    })();
  </script>
</body>
</html>
