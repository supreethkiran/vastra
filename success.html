<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VASTRA - Order Success</title>
  <style>
    :root {
      --bg: #060608;
      --surface: #101118;
      --text: #f0ece4;
      --muted: rgba(240, 236, 228, 0.65);
      --gold: #c9a96e;
      --border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; }
    .container { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 14px 35px rgba(0,0,0,0.35); }
    .ok { font-size: 44px; margin-bottom: 8px; }
    h1 { margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.5; }
    .order-id { margin-top: 14px; color: var(--gold); font-weight: 700; }
    .list { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
    .item { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .total { margin-top: 16px; font-size: 20px; font-weight: 700; color: var(--gold); }
    .actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { border-radius: 10px; padding: 10px 16px; text-decoration: none; font-weight: 700; }
    .primary { background: var(--gold); color: #111; }
    .ghost { border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="ok">✓</div>
      <h1>Payment Successful</h1>
      <p>Your order has been confirmed and is now being processed.</p>
      <p class="order-id" id="orderIdText">Order ID: --</p>
      <div id="orderProducts" class="list"></div>
      <p class="total" id="orderTotal">Total Paid: ₹0</p>
      <div class="actions">
        <a href="./1.html" class="btn primary">Continue Shopping</a>
        <a href="./cart.html" class="btn ghost">Go to Cart</a>
      </div>
    </section>
  </main>

  <script src="/firebase-config.js"></script>
  <script type="module" src="/firebase-init.js"></script>
  <script src="./cart.js"></script>
  <script>
    const orderIdParam = new URLSearchParams(window.location.search).get("orderId");
    const orderId = orderIdParam || "N/A";

    document.getElementById("orderIdText").textContent = "Order ID: " + orderId;

    async function loadOrder() {
      if (!orderIdParam || !window.firebaseApi?.getOrderById) {
        document.getElementById("orderProducts").innerHTML = "<p>No order items found.</p>";
        return;
      }
      try {
        const order = await window.firebaseApi.getOrderById(orderIdParam);
        if (!order || !Array.isArray(order.items) || !order.items.length) {
          document.getElementById("orderProducts").innerHTML = "<p>No order items found.</p>";
          return;
        }
        document.getElementById("orderProducts").innerHTML = order.items
          .map((item) => `
            <div class="item">
              <span>${item.name} x ${item.qty}</span>
              <strong>${window.VastraCart.formatPrice(item.price * item.qty)}</strong>
            </div>
          `)
          .join("");
        document.getElementById("orderTotal").textContent = "Total Paid: " + window.VastraCart.formatPrice(order.total || 0);
      } catch (error) {
        document.getElementById("orderProducts").innerHTML = `<p>${error.message || "Unable to load order."}</p>`;
      }
    }
    loadOrder();
  </script>
</body>
</html>
